name: Weekly Security Digest

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 14 * * 0'  # Every Sunday at 14:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch CVE data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/fetch-cves.js

      - name: Analyze with AI
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/analyze-cves.js
        env:
          GITHUB_TOKEN: ${{ secrets.MODELS_TOKEN }}

      - name: Build site
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/build-site.js

      - name: Commit changes
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ docs/
          if ! git diff --staged --quiet; then
            git commit -m "Weekly security digest - $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
